# API Contract: Todo Endpoints

## Overview
This document defines the API contracts for todo management endpoints in the multi-user todo web application.

## Todo Endpoints

### GET /api/todos
Retrieve all todo items for the authenticated user.

#### Request
```
GET /api/todos
Authorization: Bearer {access_token}
```

**Query Parameters:**
- `limit` (optional): Number of items to return (default: 50, max: 100)
- `offset` (optional): Number of items to skip (default: 0)
- `completed` (optional): Filter by completion status (true/false)

#### Response

**Success (200 OK):**
```json
{
  "items": [
    {
      "id": 1,
      "title": "Buy groceries",
      "description": "Milk, eggs, bread",
      "is_completed": false,
      "user_id": 123,
      "created_at": "2026-01-07T10:00:00Z",
      "updated_at": "2026-01-07T10:00:00Z"
    },
    {
      "id": 2,
      "title": "Walk the dog",
      "description": null,
      "is_completed": true,
      "user_id": 123,
      "created_at": "2026-01-07T09:30:00Z",
      "updated_at": "2026-01-07T10:15:00Z"
    }
  ],
  "total": 2,
  "limit": 50,
  "offset": 0
}
```

### POST /api/todos
Create a new todo item for the authenticated user.

#### Request
```
POST /api/todos
Authorization: Bearer {access_token}
Content-Type: application/json
```

**Request Body:**
```json
{
  "title": "New todo item",
  "description": "Detailed description of the task"
}
```

**Validation:**
- `title`: Required, maximum 200 characters
- `description`: Optional, maximum 1000 characters

#### Response

**Success (201 Created):**
```json
{
  "id": 3,
  "title": "New todo item",
  "description": "Detailed description of the task",
  "is_completed": false,
  "user_id": 123,
  "created_at": "2026-01-07T11:00:00Z",
  "updated_at": "2026-01-07T11:00:00Z"
}
```

**Error (400 Bad Request):**
```json
{
  "detail": "Validation error"
}
```

### GET /api/todos/{id}
Retrieve a specific todo item for the authenticated user.

#### Request
```
GET /api/todos/{id}
Authorization: Bearer {access_token}
```

#### Response

**Success (200 OK):**
```json
{
  "id": 1,
  "title": "Buy groceries",
  "description": "Milk, eggs, bread",
  "is_completed": false,
  "user_id": 123,
  "created_at": "2026-01-07T10:00:00Z",
  "updated_at": "2026-01-07T10:00:00Z"
}
```

**Error (404 Not Found):**
```json
{
  "detail": "Todo item not found"
}
```

**Error (401 Unauthorized):**
```json
{
  "detail": "Not authenticated"
}
```

### PUT /api/todos/{id}
Update a specific todo item for the authenticated user.

#### Request
```
PUT /api/todos/{id}
Authorization: Bearer {access_token}
Content-Type: application/json
```

**Request Body:**
```json
{
  "title": "Updated todo title",
  "description": "Updated description",
  "is_completed": true
}
```

**Validation:**
- `title`: Optional, maximum 200 characters if provided
- `description`: Optional, maximum 1000 characters if provided
- `is_completed`: Optional boolean if provided

#### Response

**Success (200 OK):**
```json
{
  "id": 1,
  "title": "Updated todo title",
  "description": "Updated description",
  "is_completed": true,
  "user_id": 123,
  "created_at": "2026-01-07T10:00:00Z",
  "updated_at": "2026-01-07T11:30:00Z"
}
```

**Error (400 Bad Request):**
```json
{
  "detail": "Validation error"
}
```

**Error (404 Not Found):**
```json
{
  "detail": "Todo item not found"
}
```

### PATCH /api/todos/{id}
Partially update a specific todo item for the authenticated user.

#### Request
```
PATCH /api/todos/{id}
Authorization: Bearer {access_token}
Content-Type: application/json
```

**Request Body:**
```json
{
  "is_completed": true
}
```

#### Response

**Success (200 OK):**
```json
{
  "id": 1,
  "title": "Buy groceries",
  "description": "Milk, eggs, bread",
  "is_completed": true,
  "user_id": 123,
  "created_at": "2026-01-07T10:00:00Z",
  "updated_at": "2026-01-07T11:35:00Z"
}
```

**Error (400 Bad Request):**
```json
{
  "detail": "Validation error"
}
```

**Error (404 Not Found):**
```json
{
  "detail": "Todo item not found"
}
```

### DELETE /api/todos/{id}
Delete a specific todo item for the authenticated user.

#### Request
```
DELETE /api/todos/{id}
Authorization: Bearer {access_token}
```

#### Response

**Success (204 No Content):**
- No response body

**Error (404 Not Found):**
```json
{
  "detail": "Todo item not found"
}
```